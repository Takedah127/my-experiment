<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jsPsych - Red Circle Experiment</title>
  
  <!-- jsPsych v7系の本体ライブラリとCSS、およびhtml-keyboard-responseプラグインの読み込み -->
  <script src="https://unpkg.com/jspsych@7.3.4/dist/index.browser.min.js"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3/dist/index.browser.min.js"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />

  <style>
    /* 1. 全体の背景色を灰色 (#808080) に設定、文字を読みやすく白に設定 */
    html, body {
      background-color: #808080 !important;
      color: #ffffff;
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    }

    /* jsPsychの表示領域自体の背景色も灰色に統一 */
    .jspsych-display-element {
      background-color: #808080 !important;
      color: #ffffff;
    }

    /* 2. 直径100pxの赤い円を描画するCSS */
    .red-circle {
      width: 100px;
      height: 100px;
      background-color: red;
      border-radius: 50%;
      margin: 0 auto;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3); /* 少し立体感を持たせる影 */
    }

    /* 説明テキストのスタイル */
    .instruction-text {
      margin-top: 30px;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
    }

    /* 終了メッセージのスタイル */
    .end-message {
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- jsPsychが展開されるターゲット要素 -->
  <div id="jspsych-target"></div>

  <script>
    // jsPsychの初期化
    const jsPsych = initJsPsych({
      display_element: 'jspsych-target'
    });

    // タイムラインの定義
    const timeline = [];

    // 2 & 3. 画面中央に赤い円を表示し、スペースキーが押されるまで維持するトライアル
    const circle_trial = {
      type: jsPsychHtmlKeyboardResponse,
      // DIVタグとCSSを使用して赤い円を描画し、直下に案内テキストを配置
      stimulus: `
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
          <div class="red-circle"></div>
          <p class="instruction-text">スペースキーを押すと次に進みます。</p>
        </div>
      `,
      // 反応キーをスペースキー（' '）に限定する
      choices: [' '],
      // キーが押されるまで永続的に表示（nullはタイムアウトなしを意味します）
      trial_duration: null
    };
    timeline.push(circle_trial);

    // 4. キーが押された後の終了メッセージ画面
    const end_trial = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="end-message">
          <p>終了しました。</p>
          <p>ご協力ありがとうございました。</p>
        </div>
      `,
      // 終了メッセージを表示したままにするため、キー入力を受け付けない設定
      choices: "NO_KEYS",
      trial_duration: null
    };
    timeline.push(end_trial);

    // 実験の開始
    window.onload = function() {
      jsPsych.run(timeline);
    };
  </script>
</body>
</html>
