<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stroop Task</title>

  <!-- jsPsych core library (v7.3) -->
  <script src="https://unpkg.com/jspsych@7.3.0"></script>
  <!-- jsPsych stylesheet -->
  <link href="https://unpkg.com/jspsych@7.3.0/css/jspsych.css" rel="stylesheet" type="text/css" />
  
  <!-- Keyboard response plugin -->
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
  <!-- Fullscreen plugin -->
  <script src="https://unpkg.com/@jspsych/plugin-fullscreen@1.2.1"></script>

  <style>
    /* Reset and base styles for the experiment */
    body {
      background-color: #FFFFFF !important;
      color: #333333;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    /* Center jsPsych display area vertically and horizontally */
    .jspsych-display-element {
      background-color: #FFFFFF !important;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Style for instructions card */
    .instruction-text {
      font-size: 24px;
      line-height: 1.8;
      text-align: left;
      max-width: 700px;
      margin: 0 auto;
      padding: 24px;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      background-color: #F8FAFC;
    }

    .instruction-highlight {
      font-weight: bold;
      color: #1E293B;
      background: linear-gradient(transparent 70%, #FEF08A 70%);
    }

    .key-guide {
      margin: 15px 0;
      padding-left: 20px;
      font-weight: bold;
    }

    .key-badge {
      display: inline-block;
      padding: 2px 10px;
      margin: 0 4px;
      background-color: #E2E8F0;
      border: 1px solid #CBD5E1;
      border-radius: 6px;
      font-family: monospace;
      font-size: 20px;
    }

    /* Style for stimuli presentation */
    .stimulus-text {
      font-size: 60px;
      font-weight: bold;
      user-select: none;
    }

    /* Fullscreen and button stylings */
    .jspsych-btn {
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif !important;
      font-size: 18px !important;
      padding: 12px 30px !important;
      border-radius: 8px !important;
      background-color: #3B82F6 !important;
      border: none !important;
      color: white !important;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
    }
    .jspsych-btn:hover {
      background-color: #2563EB !important;
    }
    .jspsych-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <script>
    const jsPsych = initJsPsych({
      // Display CSV data on the screen after the timeline finishes
      on_finish: function() {
        jsPsych.data.displayData('csv');
      }
    });

    // Note: Stimulus words are in Japanese for preview rendering, color codes and correct keys are in English
    const stimuli_pool = [
      // Congruent Conditions
      { word: "オレンジ", color: "darkorange", condition: "congruent", correct_key: "o" },
      { word: "ピンク", color: "deeppink", condition: "congruent", correct_key: "p" },
      { word: "黒", color: "black", condition: "congruent", correct_key: "b" },
      
      // Incongruent Conditions
      { word: "オレンジ", color: "deeppink", condition: "incongruent", correct_key: "p" },
      { word: "オレンジ", color: "black", condition: "incongruent", correct_key: "b" },
      { word: "ピンク", color: "darkorange", condition: "incongruent", correct_key: "o" },
      { word: "ピンク", color: "black", condition: "incongruent", correct_key: "b" },
      { word: "黒", color: "darkorange", condition: "incongruent", correct_key: "o" },
      { word: "黒", color: "deeppink", condition: "incongruent", correct_key: "p" }
    ];

    // Randomly sample 10 trials with replacement for the demo run
    const sampled_stimuli = jsPsych.randomization.sampleWithReplacement(stimuli_pool, 10);

    // Initialize the main experimental timeline array
    const timeline = [];

    // Check if fullscreen is supported in this browser context (helps prevent crashes in nested iframes)
    const isFullscreenSupported = document.fullscreenEnabled || 
                                  document.webkitFullscreenEnabled || 
                                  document.mozFullScreenEnabled || 
                                  document.msFullscreenEnabled;

    if (isFullscreenSupported) {
      // Append fullscreen transition screen if supported
      const fullscreen_trial = {
        type: jsPsychFullscreen,
        fullscreen_mode: true,
        button_label: "全画面にして開始"
      };
      timeline.push(fullscreen_trial);
    } else {
      // Safely bypass fullscreen mode if permissions are denied
      console.warn("Fullscreen permission is restricted in this browser context. Skipping fullscreen request.");
    }

    const instructions = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="instruction-text">
          <p>画面に表示される文字の<span class="instruction-highlight">「色」</span>を、できるだけ早く正確にキーボードで答えてください。</p>
          <p>文字の意味（言葉）は無視して、文字自体の「色」だけに注目してください。</p>
          <div class="key-guide">
            - <span style="color: darkorange;">オレンジ色</span>の文字の場合: <span class="key-badge">O</span> キーを押す<br>
            - <span style="color: deeppink;">ピンク色</span>の文字の場合: <span class="key-badge">P</span> キーを押す<br>
            - <span style="color: black;">黒色</span>の文字の場合: <span class="key-badge">B</span> キーを押す
          </div>
          <p style="text-align: center; margin-top: 35px; color: #475569; font-size: 20px;">
            <span class="key-badge" style="font-size: 16px;">スペース</span> キーを押すと実験が始まります。
          </p>
        </div>
      `,
      choices: [' '], // Accept only the space key
      on_load: function() {
        // Clear focus on previous buttons to ensure keyboard events register properly immediately
        if (document.activeElement) {
          document.activeElement.blur();
        }
        window.focus();
      }
    };
    timeline.push(instructions);

    const trial_procedure = {
      timeline: [
        // Trial Phase A: Fixation cross (+) displayed for 500ms
        {
          type: jsPsychHtmlKeyboardResponse,
          stimulus: '<div class="stimulus-text" style="color: #64748B;">+</div>',
          choices: "NO_KEYS",
          trial_duration: 500
        },
        // Trial Phase B: Stimulus presentation until user presses a valid response key
        {
          type: jsPsychHtmlKeyboardResponse,
          stimulus: function() {
            const current_word = jsPsych.timelineVariable('word');
            const current_color = jsPsych.timelineVariable('color');
            return `<div class="stimulus-text" style="color: ${current_color};">${current_word}</div>`;
          },
          choices: ['o', 'p', 'b'], // Allowed keys
          data: {
            task: 'stroop_response',
            word: jsPsych.timelineVariable('word'),
            color: jsPsych.timelineVariable('color'),
            condition: jsPsych.timelineVariable('condition'),
            correct_response: jsPsych.timelineVariable('correct_key')
          },
          on_finish: function(data) {
            // Check if user answer is correct
            data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
          }
        },
        // Trial Phase C: Inter-Trial Interval (ITI) of 1000ms (Blank screen)
        {
          type: jsPsychHtmlKeyboardResponse,
          stimulus: '',
          choices: "NO_KEYS",
          trial_duration: 1000
        }
      ],
      timeline_variables: sampled_stimuli // Load the pre-sampled trials
    };
    timeline.push(trial_procedure);

    window.onload = function() {
      jsPsych.run(timeline);
    };
  </script>
</body>
</html>
